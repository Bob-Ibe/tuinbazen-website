<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI · Foto Lightbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1B6B35;
      --green2: #3D9E48;
      --navy:   #1C2B3A;
      --cream:  #F5F0E8;
      --radius: 12px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .section {
      max-width: 1000px;
      margin: 0 auto;
    }

    .section-header {
      margin-bottom: 1.75rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .section-header h2 {
      font-family: Georgia, serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: var(--navy);
    }

    .label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green2);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1.25fr 1fr 1fr;
      grid-template-rows: 260px 260px;
      gap: 0.75rem;
    }

    .item-groot { grid-row: span 2; }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: repeat(3, 200px);
      }
      .item-groot { grid-row: span 1; }
    }

    @media (max-width: 440px) {
      .grid { grid-template-columns: 1fr; grid-template-rows: none; }
      .grid-item { height: 220px; }
    }

    .grid-item {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: #ddd;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .grid-item:hover img { transform: scale(1.05); }

    /* Chip label */
    .chip {
      position: absolute;
      bottom: 0.75rem;
      left: 0.75rem;
      background: rgba(27,107,53,0.88);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .grid-item:hover .chip {
      opacity: 1;
      transform: translateY(0);
    }

    /* Zoom-icoon */
    .zoom-icon {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .zoom-icon svg {
      width: 15px;
      height: 15px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .grid-item:hover .zoom-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Lightbox overlay ── */
    .lb {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10,14,18,0.94);
      align-items: center;
      justify-content: center;
      padding: 4rem 5rem;
      animation: fadeIn 0.2s ease;
    }

    .lb.open { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lb-inner {
      position: relative;
      max-width: 860px;
      width: 100%;
      text-align: center;
      animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .lb-img-wrap {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      line-height: 0;
    }

    .lb-img-wrap img {
      max-height: 75vh;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.2s;
    }

    .lb-img-wrap img.loading { opacity: 0; }

    .lb-caption {
      margin-top: 1rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.88rem;
    }

    .lb-counter {
      margin-top: 0.35rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.78rem;
    }

    /* Knoppen */
    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      line-height: 1;
      backdrop-filter: blur(4px);
    }

    .lb-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-50%) scale(1.08);
    }

    #lb-prev { left: 1.25rem; }
    #lb-next { right: 1.25rem; }

    .lb-close {
      position: fixed;
      top: 1rem;
      right: 1.25rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .lb-close:hover {
      background: rgba(255,255,255,0.22);
      transform: rotate(90deg);
    }

    /* Thumbnail strip */
    .lb-thumbs {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.4rem;
    }

    .lb-thumb {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.45;
      border: 2px solid transparent;
      transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .lb-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .lb-thumb.active {
      opacity: 1;
      border-color: var(--green2);
      transform: scale(1.08);
    }

    @media (max-width: 600px) {
      .lb { padding: 3rem 3.5rem; }
      #lb-prev { left: 0.25rem; }
      #lb-next { right: 0.25rem; }
      .lb-thumbs { display: none; }
    }
  </style>
</head>
<body>

<section class="section">

  <div class="section-header">
    <div>
      <div class="label">Portfolio</div>
      <h2>Eerder werk</h2>
    </div>
    <a href="#" style="font-size:0.9rem;font-weight:700;color:#1B6B35;text-decoration:none;">Alles bekijken →</a>
  </div>

  <div class="grid" id="grid">

    <div class="grid-item item-groot" data-caption="Terras — avondsfeer">
      <img src="../img/portfolio/terras-avond.jpg" alt="Terras aangelegd door Tuinbazen">
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <span class="chip">Terras</span>
    </div>

    <div class="grid-item" data-caption="Bestrating op maat">
      <img src="../img/portfolio/bestrating-groot.jpg" alt="Bestrating aangelegd door Tuinbazen">
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <span class="chip">Bestrating</span>
    </div>

    <div class="grid-item" data-caption="Vlonder in rood hardhout">
      <img src="../img/portfolio/vlonder-rood.jpg" alt="Vlonder aangelegd door Tuinbazen">
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <span class="chip">Vlonder</span>
    </div>

    <div class="grid-item" data-caption="Gazon met sierborders">
      <img src="../img/portfolio/gazon-borders.jpg" alt="Gazon aangelegd door Tuinbazen">
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <span class="chip">Gazon</span>
    </div>

    <div class="grid-item" data-caption="Schutting in hardhout">
      <img src="../img/portfolio/schutting-hout.jpg" alt="Schutting geplaatst door Tuinbazen">
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <span class="chip">Schutting</span>
    </div>

  </div>

</section>

<!-- ── Lightbox ── -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Sluiten">✕</button>
  <button class="lb-btn" id="lb-prev" aria-label="Vorige">&#8249;</button>
  <button class="lb-btn" id="lb-next" aria-label="Volgende">&#8250;</button>

  <div class="lb-inner">
    <div class="lb-img-wrap">
      <img src="" alt="" id="lb-img">
    </div>
    <p class="lb-caption" id="lb-caption"></p>
    <p class="lb-counter" id="lb-counter"></p>
  </div>

  <div class="lb-thumbs" id="lb-thumbs"></div>
</div>

<script>
  const lb        = document.getElementById('lb');
  const lbImg     = document.getElementById('lb-img');
  const lbCap     = document.getElementById('lb-caption');
  const lbCounter = document.getElementById('lb-counter');
  const lbThumbsEl= document.getElementById('lb-thumbs');
  const lbClose   = document.getElementById('lb-close');
  const lbPrev    = document.getElementById('lb-prev');
  const lbNext    = document.getElementById('lb-next');

  const items = Array.from(document.querySelectorAll('.grid-item'));
  let current = 0;

  /* Thumbnails aanmaken */
  items.forEach((item, i) => {
    const img = item.querySelector('img');
    const th  = document.createElement('div');
    th.className = 'lb-thumb';
    th.innerHTML = `<img src="${img.src}" alt="${img.alt}">`;
    th.addEventListener('click', () => go(i));
    lbThumbsEl.appendChild(th);
  });

  function updateThumbs() {
    lbThumbsEl.querySelectorAll('.lb-thumb').forEach((t, i) =>
      t.classList.toggle('active', i === current)
    );
  }

  function go(index) {
    current = (index + items.length) % items.length;
    const item = items[current];
    const img  = item.querySelector('img');

    lbImg.classList.add('loading');
    lbImg.onload = () => lbImg.classList.remove('loading');
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    lbCap.textContent     = item.dataset.caption || '';
    lbCounter.textContent = `${current + 1} / ${items.length}`;
    updateThumbs();
  }

  function open(index) {
    go(index);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  items.forEach((item, i) => item.addEventListener('click', () => open(i)));
  lbClose.addEventListener('click', close);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  lbPrev.addEventListener('click', () => go(current - 1));
  lbNext.addEventListener('click', () => go(current + 1));

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  go(current - 1);
    if (e.key === 'ArrowRight') go(current + 1);
  });

  /* Swipe */
  let sx = 0;
  lb.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend',   e => {
    const diff = sx - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) go(diff > 0 ? current + 1 : current - 1);
  });
</script>
</body>
</html>
